    <!-- ============================================================
         DYNAMIC META UPDATER
         Dipanggil dari React (via window.updatePageMeta) setiap kali
         halaman berubah. Memperbarui semua tag OG, Twitter, canonical,
         title, description, dan structured data.

         Kenapa perlu ini?
         - SPA (React) tidak reload HTML saat navigasi
         - Crawler media sosial (WhatsApp, Telegram, FB, Twitter/X)
           membaca HTML mentah dari server, bukan hasil JS
         - Solusi lengkap butuh SSR (Next.js) atau prerender proxy
         - Untuk crawler bot yg menjalankan JS (Googlebot, dll),
           updatePageMeta() memastikan meta tags sudah terset
           sebelum bot mengindeks konten
         ============================================================ -->
    <script>
      const BASE_URL = 'https://beritakini.online';

      /**
       * Update semua meta tags secara dinamis.
       * Dipanggil dari React komponen saat halaman/artikel berubah.
       *
       * @param {Object} meta
       * @param {string} meta.title        - Judul halaman (tanpa suffix)
       * @param {string} meta.description  - Meta description (maks 160 char)
       * @param {string} meta.url          - Path relatif, contoh: /artikel/slug
       * @param {string} [meta.image]      - URL gambar absolut untuk OG image
       * @param {string} [meta.type]       - og:type, default 'article' untuk artikel
       * @param {string} [meta.author]     - Nama penulis artikel
       * @param {string} [meta.datePublished] - ISO date string
       * @param {Object} [meta.schema]     - Custom JSON-LD object (opsional)
       */
      window.updatePageMeta = function(meta) {
        const SITE_NAME = 'Berita Kini';
        const SUFFIX    = ' — ' + SITE_NAME;
        const fullTitle = meta.title ? (meta.title + SUFFIX) : (SITE_NAME + ' — Portal Berita Terpercaya Indonesia');
        const fullUrl   = meta.url ? (BASE_URL + meta.url) : BASE_URL;
        const image     = meta.image || (BASE_URL + '/og-image.jpg');
        const desc      = meta.description || 'Menyajikan berita terkini, analisis mendalam, dan jurnalisme berkualitas untuk masyarakat Indonesia.';

        // --- <title> ---
        document.title = fullTitle;

        // --- <meta name="description"> ---
        let descTag = document.querySelector('meta[name="description"]');
        if (descTag) descTag.setAttribute('content', desc);

        // --- Canonical ---
        const canonical = document.getElementById('canonical-url');
        if (canonical) canonical.setAttribute('href', fullUrl);

        // --- Open Graph ---
        const setMeta = (id, val) => {
          const el = document.getElementById(id);
          if (el) el.setAttribute('content', val);
        };

        setMeta('og-url',         fullUrl);
        setMeta('og-title',       fullTitle);
        setMeta('og-description', desc);
        setMeta('og-image',       image);
        setMeta('og-image-width', '1200');
        setMeta('og-image-height','630');

        // og:type — 'article' untuk artikel, 'website' untuk halaman lain
        let ogType = document.querySelector('meta[property="og:type"]');
        if (ogType) ogType.setAttribute('content', meta.type || 'website');

        // og:article:author dan og:article:published_time
        if (meta.author) {
          let ogAuthor = document.querySelector('meta[property="article:author"]');
          if (!ogAuthor) {
            ogAuthor = document.createElement('meta');
            ogAuthor.setAttribute('property', 'article:author');
            document.head.appendChild(ogAuthor);
          }
          ogAuthor.setAttribute('content', meta.author);
        }

        if (meta.datePublished) {
          let ogDate = document.querySelector('meta[property="article:published_time"]');
          if (!ogDate) {
            ogDate = document.createElement('meta');
            ogDate.setAttribute('property', 'article:published_time');
            document.head.appendChild(ogDate);
          }
          ogDate.setAttribute('content', meta.datePublished);
        }

        // --- Twitter Card ---
        setMeta('tw-card',        'summary_large_image');
        setMeta('tw-title',       fullTitle);
        setMeta('tw-description', desc);
        setMeta('tw-image',       image);

        // --- JSON-LD Structured Data ---
        const schemaTag = document.getElementById('schema-org');
        if (schemaTag) {
          const schema = meta.schema || {
            '@context': 'https://schema.org',
            '@type':    'NewsMediaOrganization',
            name:       SITE_NAME,
            url:        BASE_URL,
            description:'Portal berita terpercaya untuk masyarakat Indonesia.',
            foundingDate:'2020',
            founder: { '@type':'Person', name:'Imam Sahroni Darmawan, S.T' },
          };
          schemaTag.textContent = JSON.stringify(schema);
        }
      };
    </script>
