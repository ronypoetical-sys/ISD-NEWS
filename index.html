    <style>
      *, *::before, *::after { box-sizing: border-box; }

      /* =====================================================
         NEWS TICKER — SOLUSI FINAL DIJAMIN JALAN DI ANDROID
         =====================================================
         PRINSIP:
         1. Semua animasi HANYA di CSS global ini (bukan inline)
         2. Struktur: overflow:hidden > flex-row (bukan absolute)
         3. Keyframe: HANYA translateX, tidak ada translateZ
         4. Duplikasi 3x konten → gerak -33.333% = seamless loop
         ===================================================== */

      /* Container luar — memotong konten yang keluar */
      .news-ticker-outer {
        overflow: hidden;
        flex: 1;
        display: block;
        height: 34px;
        position: relative;
      }

      /* Track yang bergerak — SATU-SATUNYA elemen dengan animasi */
      .news-ticker-track {
        display: -webkit-inline-flex;
        display: inline-flex;
        -webkit-flex-direction: row;
        flex-direction: row;
        -webkit-flex-wrap: nowrap;
        flex-wrap: nowrap;
        -webkit-align-items: center;
        align-items: center;
        white-space: nowrap;
        height: 34px;
        /* ANIMASI — tidak ada override dari inline style manapun */
        -webkit-animation: newsTickerScroll 60s linear infinite;
        animation: newsTickerScroll 60s linear infinite;
      }

      /* Pause saat hover di desktop */
      .news-ticker-track:hover {
        -webkit-animation-play-state: paused;
        animation-play-state: paused;
      }

      /* Keyframe — HANYA translateX, zero transform lain */
      @-webkit-keyframes newsTickerScroll {
        from { -webkit-transform: translateX(0%); transform: translateX(0%); }
        to   { -webkit-transform: translateX(-33.3333%); transform: translateX(-33.3333%); }
      }
      @keyframes newsTickerScroll {
        from { -webkit-transform: translateX(0%); transform: translateX(0%); }
        to   { -webkit-transform: translateX(-33.3333%); transform: translateX(-33.3333%); }
      }

      /* Item individual dalam track */
      .news-ticker-item {
        display: -webkit-inline-flex;
        display: inline-flex;
        -webkit-align-items: center;
        align-items: center;
        -webkit-flex-shrink: 0;
        flex-shrink: 0;
        padding: 0 1.25rem;
        font-size: 13px;
        font-weight: 300;
        letter-spacing: 0.01em;
        line-height: 1;
        color: #fff;
      }

      .news-ticker-sep {
        color: rgba(255,255,255,0.4);
        font-size: 8px;
        -webkit-flex-shrink: 0;
        flex-shrink: 0;
        padding: 0 0.25rem;
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .news-ticker-track {
          -webkit-animation: none !important;
          animation: none !important;
        }
      }

      /* ===== KOMPONEN LAIN ===== */
      .article-card { transition: transform 0.25s ease, box-shadow 0.25s ease; }
      .article-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }
      .cat-pill { transition: all 0.2s ease; }
      .cat-pill:hover { background: #C41E3A; color: white; }
      @-webkit-keyframes pulseRed { 0%,100%{opacity:1} 50%{opacity:0.5} }
      @keyframes pulseRed { 0%,100%{opacity:1} 50%{opacity:0.5} }
      .breaking-dot { -webkit-animation: pulseRed 1.5s ease-in-out infinite; animation: pulseRed 1.5s ease-in-out infinite; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f0efed; }
      ::-webkit-scrollbar-thumb { background: #C41E3A; border-radius: 3px; }
      .article-body p { margin-bottom: 1.4em; line-height: 1.85; }
      .article-body h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin: 2rem 0 0.8rem; color: #1e1c18; }
      .article-body blockquote { border-left: 4px solid #C41E3A; padding-left: 1.2rem; color: #534f46; font-style: italic; margin: 1.5rem 0; }
      .skeleton { background: linear-gradient(90deg,#e2e0db 25%,#f0efed 50%,#e2e0db 75%); background-size: 400% 100%; animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
      .header-scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.12); }
      .img-zoom { overflow: hidden; }
      .img-zoom img { transition: transform 0.4s ease; }
      .img-zoom:hover img { transform: scale(1.04); }
      .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      :focus-visible { outline: 2px solid #C41E3A; outline-offset: 2px; border-radius: 3px; }
      .skip-link { position:absolute; top:-40px; left:0; background:#C41E3A; color:white; padding:8px 16px; z-index:9999; font-size:14px; text-decoration:none; border-radius:0 0 4px 0; transition:top 0.2s; }
      .skip-link:focus { top:0; }
