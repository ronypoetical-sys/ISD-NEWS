    <style>
      /* ============================================================
         RESET & BASE
      ============================================================ */
      *, *::before, *::after { box-sizing: border-box; }
      * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body { font-family: 'Source Sans 3', sans-serif; background: #f8f8f7; margin: 0; padding: 0; }
      .font-serif, h1, h2, h3, h4 { font-family: 'DM Serif Display', Georgia, serif; }

      /* ============================================================
         NEWS TICKER — SOLUSI FINAL ANDROID/MOBILE
         ============================================================
         Root cause Android tidak jalan:
         1. CSS class vs inline style konflik → pakai HANYA CSS class
         2. translateZ(0) conflict dengan translateX → hapus translateZ
         3. position:absolute + overflow:hidden = Android bug → ganti ke
            flex row dengan margin-left negatif trick
         4. will-change:transform bisa crash di low-end Android → set
            hanya saat animasi aktif

         Pendekatan TERBUKTI lintas browser (Chrome Android, Safari iOS,
         Firefox Android, Samsung Internet):
         - Gunakan satu @keyframes tunggal di CSS (bukan inline style)
         - Container: overflow:hidden, display:flex, width:100%
         - Track: display:flex, flex-direction:row, flex-shrink:0
         - Animasi HANYA pada transform:translateX
         - Tidak ada position:absolute sama sekali
      ============================================================ */

      /* Wrapper luar: clips konten yang keluar batas */
      .ticker-track-outer {
        overflow: hidden;
        width: 100%;
        display: flex;
        align-items: center;
      }

      /* Track yang bergerak */
      .ticker-track {
        display: flex;
        flex-direction: row;
        flex-shrink: 0;
        align-items: center;
        white-space: nowrap;
        /* Animasi SATU-SATUNYA — tidak ada inline style yang override ini */
        -webkit-animation: tickerMove 60s linear infinite;
                animation: tickerMove 60s linear infinite;
      }

      /* Pause saat hover (desktop) */
      .ticker-track:hover {
        -webkit-animation-play-state: paused;
                animation-play-state: paused;
      }

      /*
        Keyframe: gerak dari posisi awal (0) ke kiri sejauh 1/3 total width.
        Karena kita duplikasi konten 3x, setelah -33.333% tampilan
        kembali ke awal → loop seamless tanpa lompatan.
        Hanya translateX, TIDAK ada translateZ atau transform lain.
      */
      @-webkit-keyframes tickerMove {
        0%   { -webkit-transform: translateX(0); transform: translateX(0); }
        100% { -webkit-transform: translateX(-33.3333%); transform: translateX(-33.3333%); }
      }
      @keyframes tickerMove {
        0%   { -webkit-transform: translateX(0); transform: translateX(0); }
        100% { -webkit-transform: translateX(-33.3333%); transform: translateX(-33.3333%); }
      }

      /* Setiap item di dalam track */
      .ticker-item {
        display: inline-flex;
        align-items: center;
        flex-shrink: 0;
        padding: 0 1.5rem;
        font-size: 0.8125rem;   /* 13px — nyaman dibaca di mobile */
        font-weight: 300;
        letter-spacing: 0.01em;
        line-height: 1;
      }

      .ticker-sep {
        color: rgba(255, 255, 255, 0.4);
        font-size: 0.5rem;
        flex-shrink: 0;
      }

      /* Reduced motion — hormati preferensi accessibility user */
      @media (prefers-reduced-motion: reduce) {
        .ticker-track {
          -webkit-animation: none !important;
                  animation: none !important;
          overflow-x: auto;
        }
      }

      /* ============================================================
         KOMPONEN LAINNYA
      ============================================================ */
      .article-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
      }
      .article-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      }

      .cat-pill { transition: all 0.2s ease; }
      .cat-pill:hover { background: #C41E3A; color: white; }

      @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .breaking-dot { -webkit-animation: pulse-red 1.5s ease-in-out infinite; animation: pulse-red 1.5s ease-in-out infinite; }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f0efed; }
      ::-webkit-scrollbar-thumb { background: #C41E3A; border-radius: 3px; }

      .article-body p { margin-bottom: 1.4em; line-height: 1.85; }
      .article-body h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin: 2rem 0 0.8rem; color: #1e1c18; }
      .article-body blockquote { border-left: 4px solid #C41E3A; padding-left: 1.2rem; color: #534f46; font-style: italic; margin: 1.5rem 0; }

      .skeleton { background: linear-gradient(90deg, #e2e0db 25%, #f0efed 50%, #e2e0db 75%); background-size: 400% 100%; animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

      .header-scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.12); }

      .img-zoom { overflow: hidden; }
      .img-zoom img { transition: transform 0.4s ease; }
      .img-zoom:hover img { transform: scale(1.04); }

      .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
      .no-scrollbar::-webkit-scrollbar { display: none; }

      :focus-visible { outline: 2px solid #C41E3A; outline-offset: 2px; border-radius: 3px; }

      .skip-link {
        position: absolute; top: -40px; left: 0;
        background: #C41E3A; color: white;
        padding: 8px 16px; z-index: 9999;
        font-size: 14px; text-decoration: none;
        border-radius: 0 0 4px 0; transition: top 0.2s;
      }
      .skip-link:focus { top: 0; }

      @media print {
        header, footer, nav, .no-print { display: none !important; }
        .article-body { font-size: 12pt; }
      }
    </style>
