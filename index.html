    <style>
      * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
      body { font-family: 'Source Sans 3', sans-serif; background: #f8f8f7; }
      .font-serif, h1, h2, h3, h4 { font-family: 'DM Serif Display', Georgia, serif; }

      /* ===== NEWS TICKER - Fixed Implementation ===== */
      .ticker-outer {
        width: 100%;
        overflow: hidden;
        position: relative;
      }
      .ticker-inner {
        display: flex;
        white-space: nowrap;
        animation: tickerScroll 35s linear infinite;
        will-change: transform;
      }
      .ticker-inner:hover {
        animation-play-state: paused;
      }
      @keyframes tickerScroll {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      /* Article card hover */
      .article-card {
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        will-change: transform;
      }
      .article-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      }

      /* Category pill */
      .cat-pill { transition: all 0.2s ease; }
      .cat-pill:hover { background: #C41E3A; color: white; }

      /* Breaking badge pulse */
      @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .breaking-dot { animation: pulse-red 1.5s ease-in-out infinite; }

      /* Smooth scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f0efed; }
      ::-webkit-scrollbar-thumb { background: #C41E3A; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #9a1228; }

      /* Rich article body */
      .article-body p { margin-bottom: 1.4em; line-height: 1.85; }
      .article-body h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin: 2rem 0 0.8rem; color: #1e1c18; }
      .article-body blockquote { border-left: 4px solid #C41E3A; padding-left: 1.2rem; color: #534f46; font-style: italic; margin: 1.5rem 0; }

      /* Skeleton loading */
      .skeleton {
        background: linear-gradient(90deg, #e2e0db 25%, #f0efed 50%, #e2e0db 75%);
        background-size: 400% 100%;
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

      /* Header scroll shadow */
      .header-scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.12); }

      /* Image zoom on card */
      .img-zoom { overflow: hidden; }
      .img-zoom img { transition: transform 0.4s ease; }
      .img-zoom:hover img { transform: scale(1.04); }

      /* No scrollbar utility */
      .no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
      .no-scrollbar::-webkit-scrollbar { display: none; }

      /* Focus visible for accessibility */
      :focus-visible {
        outline: 2px solid #C41E3A;
        outline-offset: 2px;
        border-radius: 3px;
      }

      /* Skip to content for accessibility */
      .skip-link {
        position: absolute;
        top: -40px;
        left: 0;
        background: #C41E3A;
        color: white;
        padding: 8px 16px;
        z-index: 9999;
        font-size: 14px;
        text-decoration: none;
        border-radius: 0 0 4px 0;
        transition: top 0.2s;
      }
      .skip-link:focus { top: 0; }

      /* Print styles */
      @media print {
        header, footer, nav, .no-print { display: none !important; }
        .article-body { font-size: 12pt; }
        a { text-decoration: none; color: inherit; }
      }

      /* Reduced motion */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
        .ticker-inner { animation: none; }
      }
    </style>
