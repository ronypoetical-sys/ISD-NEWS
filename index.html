<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='8' fill='%23C41E3A'/><text y='.9em' font-size='60' x='50' dominant-baseline='middle' text-anchor='middle' fill='white' font-weight='bold'>I</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ISD NEWS - Portal Berita Terpercaya, Aktual, dan Menginspirasi. Sajikan informasi terkini dari seluruh penjuru Indonesia dan dunia." />
    <meta name="theme-color" content="#C41E3A" />
    <title>ISD NEWS — Portal Berita Terpercaya</title>

    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Source+Sans+3:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['DM Serif Display', 'Georgia', 'serif'],
              sans: ['Source Sans 3', 'system-ui', 'sans-serif'],
              mono: ['DM Mono', 'monospace'],
            },
            colors: {
              brand: {
                50: '#fff1f2',
                100: '#ffe4e6',
                500: '#C41E3A',
                600: '#b01831',
                700: '#9a1228',
                800: '#7d0f21',
                900: '#640c1b',
              },
              ink: {
                50: '#f8f8f7',
                100: '#f0efed',
                200: '#e2e0db',
                300: '#c8c5be',
                400: '#a8a49b',
                500: '#8a8578',
                600: '#6e6a5e',
                700: '#534f46',
                800: '#3a3730',
                900: '#1e1c18',
              }
            },
            animation: {
              'slide-up': 'slideUp 0.4s ease-out',
              'fade-in': 'fadeIn 0.5s ease-out',
              'ticker': 'ticker 30s linear infinite',
            },
            keyframes: {
              slideUp: { '0%': { transform: 'translateY(10px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              ticker: { '0%': { transform: 'translateX(100%)' }, '100%': { transform: 'translateX(-100%)' } },
            }
          }
        }
      }
    </script>

    <style>
      * { -webkit-font-smoothing: antialiased; }
      body { font-family: 'Source Sans 3', sans-serif; background: #f8f8f7; }
      .font-serif, h1, h2, h3, h4 { font-family: 'DM Serif Display', Georgia, serif; }
      
      /* News ticker */
      .ticker-wrap { overflow: hidden; }
      .ticker-content { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; }
      .ticker-content:hover { animation-play-state: paused; }

      /* Article card hover */
      .article-card { transition: transform 0.25s ease, box-shadow 0.25s ease; }
      .article-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.12); }

      /* Category pill */
      .cat-pill { transition: all 0.2s ease; }
      .cat-pill:hover { background: #C41E3A; color: white; }

      /* Breaking badge */
      @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
      .breaking-dot { animation: pulse-red 1.5s ease-in-out infinite; }

      /* Smooth scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f0efed; }
      ::-webkit-scrollbar-thumb { background: #C41E3A; border-radius: 3px; }

      /* Rich text */
      .article-body p { margin-bottom: 1.4em; line-height: 1.85; }
      .article-body h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; margin: 2rem 0 0.8rem; }
      .article-body blockquote { border-left: 4px solid #C41E3A; padding-left: 1.2rem; color: #534f46; font-style: italic; margin: 1.5rem 0; }

      /* Skeleton loading */
      .skeleton { background: linear-gradient(90deg, #e2e0db 25%, #f0efed 50%, #e2e0db 75%); background-size: 400% 100%; animation: shimmer 1.5s infinite; }
      @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

      /* Header scroll shadow */
      .header-scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.1); }

      /* Mega nav */
      .mega-nav { transform: translateY(-8px); opacity: 0; pointer-events: none; transition: all 0.2s ease; }
      .nav-item:hover .mega-nav { transform: translateY(0); opacity: 1; pointer-events: all; }

      /* Image zoom on card */
      .img-zoom { overflow: hidden; }
      .img-zoom img { transition: transform 0.4s ease; }
      .img-zoom:hover img { transform: scale(1.04); }

      /* Print styles */
      @media print {
        header, footer, nav, .no-print { display: none !important; }
        .article-body { font-size: 12pt; }
      }
    </style>

  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.5",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
